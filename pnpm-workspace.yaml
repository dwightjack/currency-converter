allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lefthook: true
  netlify-cli: true
  sharp: true
  unix-dgram: true
# Security settings
# https://pnpm.io/blog/2025/12/05/newsroom-npm-supply-chain-security
minimumReleaseAge: 10080 # 7 days
strictDepBuilds: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080 # 7 days
minimumReleaseAgeExclude:
  # Renovate security update: vite@8.0.5
  - vite@8.0.5
  # Renovate security update: svelte@5.55.7
  - svelte@5.55.7
